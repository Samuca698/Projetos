}

   background-color: rgb(7, 0, 36);

.pe {
     background-color: rgb(7, 0, 36);
    padding: 20px;

.titulo{
color: white;
}

.nota{
color: white;
}

.genero{
color: white;
}

.classificacao{
color: white;
}

a {
    text-decoration: none;

}

h1{
    color: white;
    margin-left: -80%;

h1:hover{

.semi{

.inp{

}

.img-animada {
    width: 200px;
    height: 110px;

    left: 82%;
    transition: transform 0.3s ease;
    animation: flutuar 3s infinite ease-in-out;
    border-radius: 15px;
}


.img-animada:hover{
    transform: scale(1.1);
}

@keyframes flutuar {

    0% {

    }

    50% {
        transform: translateY(-15px);
    }

    100% {
        transform: translateY(0px);
    }

}

.prim{
    font-size: 30px;
    margin-left: 25%;
    margin-bottom: -2%;
transition: 0.3 ease;
    transition: transform 0.3 ease;
    font-family: "Bungee", sans-serif;
}


.prim:hover{
color: rgb(48, 47, 47);
   transform: scale(1.1);
}
